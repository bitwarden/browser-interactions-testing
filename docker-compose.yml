name: v2026-06-01
services:
  bitwarden:
    depends_on:
      - db
    env_file:
      - .env
    image: ghcr.io/bitwarden/lite@sha256:01181904fd02020dbc4d0598dd31a153b3784abd8a4d3ac9099fc1a939a58e6e # 2026.6.1
    restart: "no"
    ports:
      - ${VAULT_HOST_PORT}:8443
      - ${VAULT_HOST_INSECURE_PORT}:8080
    volumes:
      - ./${BW_SSL_CERT}:/etc/bitwarden/${BW_SSL_CERT}
      - ./${BW_SSL_KEY}:/etc/bitwarden/${BW_SSL_KEY}
      - ./flags.json:/app/Api/flags.json

  db:
    environment:
      MARIADB_USER: ${BW_DB_USERNAME}
      MARIADB_PASSWORD: ${BW_DB_PASSWORD}
      MARIADB_DATABASE: ${BW_DB_DATABASE}
      MARIADB_RANDOM_ROOT_PASSWORD: "true"
    image: mariadb@sha256:b1c7bf836e64ed9406a8984af29509f40089d55cea14b32f12c4726a1f17104b # 12
    restart: "no"
    volumes:
      - data:/var/lib/mysql
    ports:
      - ${BW_DB_PORT}:${BW_DB_PORT}

volumes:
  bitwarden:
  data:
